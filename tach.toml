interfaces = []
exclude = []
source_roots = [
    "model/atmosphere/advection/src",
    "model/atmosphere/diffusion/src",
    "model/atmosphere/dycore/src",
    "model/atmosphere/subgrid_scale_physics/microphysics/src",
    "model/atmosphere/subgrid_scale_physics/muphys/src",
    "model/standalone_driver/src",
    "model/common/src",
    "model/driver/src",
    "model/testing/src",
    "tools/src",
    "bindings/src",
]
exact = true
forbid_circular_dependencies = true
# exclude optional external dependencies
[external]
exclude = [
    # workspace member: tach resolves this import via source_roots, so the external pip dep appears unused
    "icon4py_tools",
    "fprettify",
    "configargparse",
    "cupy",
    "ghex",
    "dace",
    "mpi4py",
    "netcdf4",
    "pymetis",
    "xarray",
    "uxarray",
    "cftime",
    "viztracer",
    "clang_format",
]
rename = ["serialbox:serialbox4py"]

[[modules]]
path = "icon4py.model.atmosphere.subgrid_scale_physics.muphys"
depends_on = [{ path = "icon4py.model.common" }]

[[modules]]
path = "icon4py.model.atmosphere.advection"
depends_on = [{ path = "icon4py.model.common" }]

[[modules]]
path = "icon4py.model.atmosphere.diffusion"
depends_on = [{ path = "icon4py.model.common" }]

[[modules]]
path = "icon4py.model.atmosphere.dycore"
depends_on = [{ path = "icon4py.model.common" }]

[[modules]]
path = "icon4py.model.atmosphere.subgrid_scale_physics.microphysics"
depends_on = [{ path = "icon4py.model.common" }]

[[modules]]
path = "icon4py.model.standalone_driver"
depends_on = [
    { path = "icon4py.model.atmosphere.advection" },
    { path = "icon4py.model.atmosphere.diffusion" },
    { path = "icon4py.model.atmosphere.dycore" },
    { path = "icon4py.model.atmosphere.subgrid_scale_physics.microphysics" },
    { path = "icon4py.model.common" },
]

[[modules]]
path = "icon4py.model.common"
depends_on = []

[[modules]]
path = "icon4py.model.driver"
depends_on = [
    { path = "icon4py.model.atmosphere.diffusion" },
    { path = "icon4py.model.atmosphere.dycore" },
    { path = "icon4py.model.common" },
    # debt: serialbox-based initialization lives in testing
    # (see docs/development/architecture_refactoring_proposal.md, Phases 1-2)
    { path = "icon4py.model.testing" },
]

# debt: the component/driver edges below exist because testing mixes generic test
# infrastructure with the ICON-reference experiment registry (datatest_utils.py,
# definitions.py). They are removed by extracting icon4py-validation
# (see docs/development/architecture_refactoring_proposal.md, Phase 1).
[[modules]]
path = "icon4py.model.testing"
depends_on = [
    { path = "icon4py.model.atmosphere.advection" },
    { path = "icon4py.model.atmosphere.diffusion" },
    { path = "icon4py.model.atmosphere.dycore" },
    { path = "icon4py.model.atmosphere.subgrid_scale_physics.microphysics" },
    { path = "icon4py.model.common" },
    { path = "icon4py.model.standalone_driver" },
]

[[modules]]
path = "icon4py.tools"
depends_on = []


[[modules]]
path = "icon4py.tools.py2fgen"
depends_on = []

[[modules]]
path = "icon4py.bindings"
depends_on = [
    { path = "icon4py.model.atmosphere.diffusion" },
    { path = "icon4py.model.atmosphere.dycore" },
    { path = "icon4py.model.atmosphere.subgrid_scale_physics.muphys" },
    { path = "icon4py.model.common" },
    { path = "icon4py.tools.py2fgen" },
]
