implicit_reexport = true
mypy_path = '''
$MYPY_CONFIG_FILE_DIR/model/atmosphere/advection/src:
$MYPY_CONFIG_FILE_DIR/model/atmosphere/diffusion/src:
$MYPY_CONFIG_FILE_DIR/model/atmosphere/dycore/src:
$MYPY_CONFIG_FILE_DIR/model/atmosphere/subgrid_scale_physics/microphysics/src:
$MYPY_CONFIG_FILE_DIR/model/atmosphere/subgrid_scale_physics/muphys/src:
$MYPY_CONFIG_FILE_DIR/model/common/src:
$MYPY_CONFIG_FILE_DIR/model/driver/src:
$MYPY_CONFIG_FILE_DIR/model/standalone_driver/src:
$MYPY_CONFIG_FILE_DIR/model/standalone_driver/tests:
$MYPY_CONFIG_FILE_DIR/model/testing/src:
$MYPY_CONFIG_FILE_DIR/tools/src:
$MYPY_CONFIG_FILE_DIR/bindings/src:
'''
namespace_packages = true
plugins = ["gt4py.next.type_system.mypy_plugin", "icon4py.model.common.type_system.mypy_plugin"]
# install_types = true
# non_interactive = true
show_column_numbers = true
show_error_codes = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
disable_error_code = ["attr-defined"]
module = ['*.stencil_tests.*', '*.unit_tests.*']

[[tool.mypy.overrides]]
ignore_errors = true
module = [
  'icon4py.model.testing.pytest_hooks',
  'icon4py.model.testing.serialbox',
  'icon4py.bindings.diffusion_wrapper',  # TODO(ricoh): replace bare ints with proper enum values, fix or ignore the rest (< 10)
  'icon4py.bindings.dycore_wrapper',  # TODO(ricoh): replace bare ints with proper enum values, fix or ignore the rest (< 10)
  'icon4py.bindings.grid_wrapper',
  'icon4py.bindings.muphys_wrapper'
]

[[tool.mypy.overrides]]  # complains about assigning to indices of NDArrayObject
disable_error_code = ["index", "misc"]
module = [
  "icon4py.model.standalone_driver.initial_condition.*"
]

[[tool.mypy.overrides]]
# GT4Py/numpy typing incompatibilities: NDArrayObject Protocol mismatch, Field
# shape attr, dtype type-var. Cannot be fixed in user code.
disable_error_code = ["arg-type", "attr-defined", "misc", "type-var", "assignment"]
module = [
  "icon4py.model.atmosphere.subgrid_scale_physics.muphys.driver.common"
]

[[tool.mypy.overrides]]
# dace has no type stubs.
disable_error_code = ["import-untyped"]
module = [
  "icon4py.model.atmosphere.subgrid_scale_physics.muphys.implementations.graupel_dace_hooks"
]

# -- pytest --
[tool.pytest]

[tool.pytest.ini_options]
addopts = ['-p icon4py.model.testing.pytest_hooks', '--strict-markers']
markers = [
  "embedded_remap_error",
  "embedded_static_args",
  "skip_value_error",
  "datatest",
  "embedded_only",
  "uses_concat_where",
  "cpu_only",
  "infinite_concat_where",
  "gtfn_too_slow",
  "continuous_benchmarking",
  "benchmark_only: benchmark only tests without verification"
]
# add all namespace packages to pythonpath to make them available for pytest
pythonpath = [
  "bindings",
  "model/atmosphere/advection",
  "model/atmosphere/diffusion",
  "model/atmosphere/dycore",
  "model/atmosphere/subgrid_scale_physics/microphysics",
  "model/atmosphere/subgrid_scale_physics/muphys",
  "model/common",
  "model/driver",
  "model/standalone_driver",
  "model/testing",
  "tools"
]

# -- ruff --
[tool.ruff]
line-length = 100
respect-gitignore = true
show-fixes = true
target-version = "py310"

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint]
# -- Rules set to be considered --
explicit-preview-rules = true
ignore = [
  'E501',  # [line-too-long]
  'B905',  # [zip-without-explicit-strict]  # TODO(egparedes): activate when possible
  'PLR0913',  # [too-many-arguments]  # TODO(egparedes): activate when possible
  'PLR2004',  # [magic-value-comparison]  # TODO(egparedes): activate when possible
  'PLR5501',  # [collapsible-else-if]  # TODO(egparedes): rediscuss in future
  'SIM102',  # [collapsible-if]  # TODO(egparedes): rediscuss in future
  'TD003'  # [missing-todo-link]
]
preview = true  # use only with explicit-preview-rules=true
select = [
  'A',  # flake8-builtins
  'B',  # flake8-bugbear
  # 'C4', #  flake8-comprehensions
  'CPY',  # flake8-copyright
  # 'D', #  pydocstyle
  'DOC',  # pydoclint
  'E',  # pycodestyle
  'ERA',  # eradicate
  'F',  # Pyflakes
  'F822',  # [undefined-export] (preview)  # TODO(egparedes): remove when not longer in preview
  'FA100',  # future-rewritable-type-annotation
  # 'FBT',  # flake8-boolean-trap
  'FLY',  # flynt
  'I',  # isort
  # 'ICN',  # flake8-import-conventions
  'ISC',  # flake8-implicit-str-concat
  # 'N',  # pep8-naming
  'NPY',  # NumPy-specific rules
  'PERF',  # Perflint
  'PGH',  # pygrep-hooks
  'PLC',  # Pylint-Convention
  'PLE',  # Pylint-Error
  'PLR',  # Pylint-Refactor
  'PLR0917',  # [too-many-positional-arguments]  # TODO(egparedes): remove when not longer in preview
  'PLW',  # Pylint-Warning
  'PTH',  # flake8-use-pathlib
  'Q',  # flake8-quotes
  'RUF',  # Ruff-specific rules
  'SIM',  # flake8-simplify
  'T10',  # flake8-debugger
  'TD',  # flake8-todos
  'UP',  # pyupgrade
  'W605',  # invalid-escape-sequence
  'YTT'  # flake8-2020
]
typing-modules = ['gt4py.eve.extended_typing']
unfixable = []

[tool.ruff.lint.flake8-bugbear]
# DeltaT / NumTimeSteps are aliases of immutable types (timedelta / int), so calling them
# in argument or dataclass defaults is safe (B008, RUF009).
extend-immutable-calls = [
  "icon4py.model.common.io.io.DeltaT",
  "icon4py.model.common.io.io.NumTimeSteps"
]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ['icon4py']
known-third-party = ['gt4py', 'packaging', 'setuptools']
lines-after-imports = 2
order-by-type = true
section-order = [
  'future',
  'standard-library',
  'third-party',
  'first-party',
  'tests',
  'local-folder'
]
split-on-trailing-comma = false

[tool.ruff.lint.isort.sections]
'tests' = ['tests']

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
# Avoid messing up conditions in gt4py stencils (SIM300)
# Stencil parameters referenced in domain specs must remain positional (PLR0917)
"**/model/**/stencils/*.py" = ["SIM300", "PLR0917"]
# Ignore spurious errors when explicitly importing fixtures in tests (F401, F811).
# Check: https://github.com/astral-sh/ruff/issues/10662
# TODO(havogt): fix error related to PLR0915, PLR0911, TD, RUF012 and remove ignores below
"**/tests/**/*_test.py" = ["F401", "F811", "PLR0915", "PLR0911", "TD", "RUF012"]
"**/tests/**/conftest.py" = ["F401", "F811"]
"**/tests/**/fixtures.py" = [
  "F401",
  "F811",
  "PLR0915",
  "PLR0911",
  "TD",
  "RUF012"
]
"**/tests/**/test_*.py" = ["F401", "F811", "PLR0915", "PLR0911", "TD", "RUF012"]

[tool.ruff.lint.pylint]
max-branches = 12
max-positional-args = 5
max-statements = 60

# -- setuptools --
[tool.setuptools]
packages = []

# -- uv: packages & workspace --
[tool.uv]
conflicts = [[{extra = "cuda12"}, {extra = "cuda13"}, {extra = "rocm7"}]]

[[tool.uv.index]]
explicit = true
name = "test.pypi"
url = "https://test.pypi.org/simple/"

[[tool.uv.index]]
explicit = true
name = 'gridtools'
url = 'https://gridtools.github.io/pypi/'

[tool.uv.sources]
# dace = {index = "gridtools"}
# gt4py = {git = "https://github.com/GridTools/gt4py", branch = "main"}
# gt4py = {index = "test.pypi"}
icon4py-atmosphere-advection = {workspace = true}
icon4py-atmosphere-diffusion = {workspace = true}
icon4py-atmosphere-dycore = {workspace = true}
icon4py-atmosphere-microphysics = {workspace = true}
icon4py-atmosphere-muphys = {workspace = true}
icon4py-bindings = {workspace = true}
icon4py-common = {workspace = true}
icon4py-driver = {workspace = true}
icon4py-standalone_driver = {workspace = true}
icon4py-testing = {workspace = true}
icon4py-tools = {workspace = true}

[tool.uv.workspace]
members = [
  "bindings",
  "model/atmosphere/advection",
  "model/atmosphere/diffusion",
  "model/atmosphere/dycore",
  "model/atmosphere/subgrid_scale_physics/microphysics",
  "model/atmosphere/subgrid_scale_physics/muphys",
  "model/common",
  "model/driver",
  "model/standalone_driver",
  "model/testing",
  "tools"
]
