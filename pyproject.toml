# -- Build system requirements (PEP 518) --

[build-system]
build-backend = 'setuptools.build_meta'
requires = ['setuptools>=61.0', 'wheel>=0.40.0']

# -- dependency groups --
[dependency-groups]
build = [
  "bump-my-version>=0.16.0",
  "pip>=22.1.1",
  "setuptools>=70.1.1",
  "wheel>=0.45.0",
  "pooch>=1.7.0"
]
dev = [
  {include-group = "build"},
  {include-group = "docs"},
  {include-group = "lint"},
  {include-group = "test"},
  {include-group = "typing"}
]
docs = [
  "esbonio>=0.16.0",
  "myst-parser>=4.0.0",
  "sphinx==7.3.7",
  "sphinx-math-dollar>=1.2.1",
  "sphinx-rtd-theme>=3.0.1",
  "sphinx-toolbox>=3.8.1",
  "TexSoup>=0.3.1"
]
lint = [
  "pre-commit>=4.0.1",
  "ruff>=0.8.0",
  "tach>=0.23.0",
  'validate-pyproject-schema-store[all]>=2025.06.13'
]
scripts = [
  "lazy-loader>=0.5",
  "packaging>=24.0",
  "pytest>=8.0.1",
  "pyyaml>=6.0",
  "rich>=13.0.0",
  "typer>=0.15",
  "f90nml>=1.5",
  {include-group = "build"}
]
test = [
  # workspace members
  "icon4py-testing~=0.2.0",
  # external dependencies
  "coverage[toml]>=7.5.0",
  "nox>=2025.5.1",
  "pytest>=8.0.1",
  "pytest-benchmark>=5.0.0",
  "pytest-cache>=1.0",
  "pytest-cov>=5.0.0",
  "pytest-factoryboy>=2.6.1",
  "pytest-mpi>=0.6",
  "pytest-unused-fixtures>=0.2.0",
  "pytest-xdist[psutil]>=3.5.0"
]
typing = [
  "mypy[faster-cache]>=1.13.0",
  "typing-extensions>=4.11.0",
  "types-cffi>=1.16.0",
  "scipy-stubs>=1.15.3.0"
]
typing-distributed = ["mpi4py>=3.1.5", "pymetis>2022.1"]

# -- Standard project description options (PEP 621) --
[project]
authors = [{email = "gridtools@cscs.ch", name = "ETH Zurich"}]
classifiers = [
  'Development Status :: 4 - Beta',
  'Intended Audience :: Science/Research',
  'License :: OSI Approved :: BSD License',
  'Operating System :: POSIX',
  'Programming Language :: Python',
  'Programming Language :: Python :: 3',
  'Programming Language :: Python :: 3 :: Only',
  'Programming Language :: Python :: 3.10',
  'Programming Language :: Python :: 3.11',
  'Programming Language :: Python :: 3.12',
  'Programming Language :: Python :: 3.13',
  'Programming Language :: Python :: 3.14',
  'Programming Language :: Python :: Implementation :: CPython',
  'Topic :: Scientific/Engineering :: Atmospheric Science',
  'Topic :: Scientific/Engineering :: Mathematics',
  'Topic :: Scientific/Engineering :: Physics'
]
dependencies = [
  "icon4py-atmosphere-advection~=0.2.0",
  "icon4py-atmosphere-diffusion~=0.2.0",
  "icon4py-atmosphere-dycore~=0.2.0",
  "icon4py-atmosphere-microphysics~=0.2.0",
  "icon4py-atmosphere-muphys~=0.2.0",
  "icon4py-common~=0.2.0",
  "icon4py-driver~=0.2.0",
  "icon4py-standalone_driver~=0.2.0"
]
description = 'ICON model in Python.'
license = {text = "BSD-3 License"}
name = "icon4py"
readme = "README.md"
requires-python = ">=3.10"
# managed by bump-my-version:
version = "0.2.0"

[project.optional-dependencies]
all = ["icon4py[distributed,fortran,io,testing,profiling]"]
cuda12 = ["icon4py-common[cuda12]"]
cuda13 = ["icon4py-common[cuda13]"]
distributed = ["icon4py-common[distributed]"]
fortran = ["icon4py-bindings~=0.2.0"]
io = ["icon4py-common[io]"]
profiling = ['viztracer>=1.1.0']
rocm7 = ["icon4py-common[rocm7]"]
testing = ["icon4py-testing"]

[project.urls]
Homepage = 'https://github.com/C2SM/icon4py'

# -- bumpversion --
[tool.bumpversion]
allow_dirty = false
commit = false
current_version = "0.2.0"
ignore_missing_version = false
message = 'Bump icon4py version: {current_version} → {new_version}'
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)(?:(?P<pre_l>a|b|rc)(?P<pre_n>\\d+))?"
serialize = ["{major}.{minor}.{patch}{pre_l}{pre_n}", "{major}.{minor}.{patch}"]
tag = false

[[tool.bumpversion.files]]
filename = "pyproject.toml"
replace = '''
# managed by bump-my-version:
version = "{new_version}"
'''
search = '''
# managed by bump-my-version:
version = "{current_version}"
'''

