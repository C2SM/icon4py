name: ICON4Py Unit Tests
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

env:
  ICON4PY_TEST_DATA_PATH: "${{ github.workspace }}/testdata"
  NUM_PROCESSES: auto
  ICON4PY_ENABLE_GRID_DOWNLOAD: false
  ICON4PY_ENABLE_TESTDATA_DOWNLOAD: false
  PYTEST_ADDOPTS: "--durations=0"

jobs:
  test-model:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
        backend: ["embedded", "dace_cpu", "gtfn_cpu"]
        component: ["advection", "diffusion", "dycore", "microphysics", "muphys", "driver", "common", "standalone_driver"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libboost-all-dev

      - name: install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.16"
          enable-cache: false
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: cache key
        id: cache-key
        run: |
          echo "key=$(./scripts/python/validation_grid_utils.py cache-key)" >> $GITHUB_OUTPUT

      - name: gridfile cache
        id: grid-cache
        uses: actions/cache@v5
        with:
          path: testdata/grids
          key: ${{ steps.cache-key.outputs.key }}

      - name: download grids
        if: steps.grid-cache.outputs.cache-hit != 'true'
        env:
          ICON4PY_ENABLE_GRID_DOWNLOAD: true
        run: |
          ./scripts/python/validation_grid_utils.py download

      - name: set GT4Py cache directory
        # Note that this assumes that each backend gets a separate job in CI.
        # Mixing e.g. dace_cpu and dace_gpu in the same cache directory may not
        # work well.
        run: echo "GT4PY_BUILD_CACHE_DIR=${{ runner.temp }}/gt4py-cache" >> $GITHUB_ENV

      - name: restore GT4Py cache
        id: gt4py-cache-restore
        if: github.ref != 'refs/heads/main'
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.GT4PY_BUILD_CACHE_DIR }}
          key: gt4py-${{ runner.os }}-${{ hashFiles('uv.lock') }}-py${{ matrix.python-version }}-${{ matrix.backend }}-${{ matrix.component }}-branch-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
          restore-keys: |
            gt4py-${{ runner.os }}-${{ hashFiles('uv.lock') }}-py${{ matrix.python-version }}-${{ matrix.backend }}-${{ matrix.component }}-branch-${{ github.head_ref || github.ref_name }}-
            gt4py-${{ runner.os }}-${{ hashFiles('uv.lock') }}-py${{ matrix.python-version }}-${{ matrix.backend }}-${{ matrix.component }}-branch-main-

      - name: run nox session - unit tests
        shell: bash
        run: |
          uvx nox -s "test_model-${{matrix.python-version}}(basic, ${{ matrix.component }})" -- --backend=${{ matrix.backend }}

      - name: run nox session - stencil tests
        shell: bash
        run: |
          uvx nox -s "test_model-${{matrix.python-version}}(stencils, ${{ matrix.component }})" -- --backend=${{ matrix.backend }} --grid=icon_regional

      - name: save GT4Py cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ env.GT4PY_BUILD_CACHE_DIR }}
          key: gt4py-${{ runner.os }}-${{ hashFiles('uv.lock') }}-py${{ matrix.python-version }}-${{ matrix.backend }}-${{ matrix.component }}-branch-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
