name: Weekly Slack Activity Summary

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      dummy_input_data:
        description: "Use synthetic data instead of calling external APIs (for testing)."
        required: false
        default: false
        type: boolean

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Generate weekly summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          ./scripts/run weekly-slack-summary generate \
            ${{ inputs.dummy_input_data == true && '--dummy-input-data' || '' }}

      # Keep the generated files as an artifact for debugging, audit, and as a
      # fallback if the Slack post needs to be replayed manually.
      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-slack-summary
          path: weekly_slack_summary_output/
          if-no-files-found: error
