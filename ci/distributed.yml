include:
  - local: 'ci/base.yml'

.test_template_distributed:
  extends: [.test_template_aarch64]
  variables:
    SLURM_JOB_NUM_NODES: 1
    SLURM_GPUS_PER_NODE: 1
    SLURM_PARTITION: "shared"
    SLURM_CPU_BIND: 'verbose'
    SLURM_LABELIO: 1
    SLURM_NTASKS: 32
    ICON4PY_TEST_DATA_PATH: "/icon4py/testdata"
    ICON4PY_ENABLE_GRID_DOWNLOAD: true
    ICON4PY_ENABLE_TESTDATA_DOWNLOAD: true
    ICON4PY_CI_GT4PY_BUILD_CACHE_BASE_DIR: /gt4py_cache
    ICON4PY_DALLCLOSE_PRINT_INSTEAD_OF_FAIL: false
    ICON4PY_DRIVER_LOGGING_LEVEL: critical
    GT4PY_BUILD_CACHE_LIFETIME: "persistent"
    PYTEST_ADDOPTS: "--durations=0"
    ICON4PY_TEST_MPI_SUBCOMM_SIZE: "4"
    CSCS_ADDITIONAL_MOUNTS: '["/capstor/store/cscs/userlab/cwci02/icon4py/ci/testdata:$ICON4PY_TEST_DATA_PATH","/iopsstor/scratch/cscs/svc_cwci02_cicd_ext:$ICON4PY_CI_GT4PY_BUILD_CACHE_BASE_DIR"]'
    # Do not use libfabric from the host system. Libfabric with slingshot
    # support is built into the container image.
    USE_MPI: NO
    # Use libfabric slingshot (cxi) provider and recommended settings from
    # https://docs.cscs.ch/software/communication/openmpi.
    SLURM_MPI_TYPE: pmix
    PMIX_MCA_psec: native
    FI_PROVIDER: cxi
    OMPI_MCA_pml: cm
    OMPI_MCA_mtl: ofi

.test_distributed_aarch64:
  stage: test
  extends: [.test_template_distributed]
  before_script:
    - cd /icon4py
    - source .venv/bin/activate
    - echo "running with $(python --version)"
    - source ci/scripts/start-cuda-mps.sh
    - source ci/scripts/gt4py-cache.sh
  script:
    - ci/scripts/ci-mpi-wrapper.sh nox -s "test_model_mpi-3.13($SELECTION, $COMPONENT)" -- --backend=$BACKEND --level=$LEVEL
  parallel:
    matrix:
      - COMPONENT: [diffusion, dycore, advection, common, standalone_driver]
        BACKEND: [embedded, dace_cpu, dace_gpu, gtfn_cpu, gtfn_gpu]
        LEVEL: [integration]
        SELECTION: [basic, datatest]
  rules:
    - if: $COMPONENT == 'standalone_driver'
      variables:
        SLURM_TIMELIMIT: '01:30:00'
        SLURM_PARTITION: "normal"
    - if: $COMPONENT == 'common'
      variables:
        SLURM_TIMELIMIT: '00:30:00'
    - if: $COMPONENT == 'common' && ($BACKEND == 'dace_cpu' || $BACKEND == 'dace_gpu' || $BACKEND == 'gtfn_gpu')
      variables:
        # TODO(msimberg): Decrease this when there's more parallelism for compilation.
        SLURM_TIMELIMIT: '01:30:00'
        # TODO(msimberg): Use shared partition when time limit can be set to at
        # most an hour. The shared partition only accepts jobs maximum an hour long.
        SLURM_PARTITION: "normal"
    - if: $COMPONENT == 'standalone_driver'
      variables:
        # TODO(msimberg): Decrease this when there's more parallelism for compilation.
        SLURM_TIMELIMIT: '02:00:00'
        # TODO(msimberg): Use shared partition when time limit can be set to at
        # most an hour. The shared partition only accepts jobs maximum an hour long.
        SLURM_PARTITION: "normal"
    - if: $COMPONENT == 'atmosphere/dycore' || $COMPONENT == 'atmosphere/advection'
      variables:
        SLURM_TIMELIMIT: '00:15:00'
    - when: on_success
      variables:
        SLURM_TIMELIMIT: '00:10:00'
  artifacts:
    when: always
    paths:
      - pytest-log-rank-*.txt

test_model_distributed:
  extends: [.test_distributed_aarch64]
