include:
  - remote: 'https://gitlab.com/cscs-ci/recipes/-/raw/master/templates/v2/.ci-ext.yml'

stages:
  - baseimage
  - image
  - generate_test
  - trigger_test
  - test
  - benchmark

variables:
  PYVERSION: 3.13.13

# Base image build step with SHA256 checksum for caching
.build_baseimage:
  stage: baseimage
  before_script:
    # include build arguments in hash since we use a parameterized Docker file
    - DOCKER_TAG=`echo "$(cat $DOCKERFILE) $DOCKER_BUILD_ARGS" | sha256sum | head -c 16`
    - export PERSIST_IMAGE_NAME=$CSCS_REGISTRY_PATH/public/$ARCH/base/icon4py:$DOCKER_TAG
    - echo "BASE_IMAGE=$PERSIST_IMAGE_NAME" >> build.env
  artifacts:
    reports:
      dotenv: build.env
  variables:
    DOCKERFILE: ci/docker/base.Dockerfile
    # change to 'always' if you want to rebuild, even if target tag exists already (if-not-exists is the default, i.e. we could also skip the variable)
    CSCS_REBUILD_POLICY: if-not-exists
    DOCKER_BUILD_ARGS: '["ARCH=$ARCH", "HPC_SDK_VERSION=$HPC_SDK_VERSION", "HPC_SDK_NAME=$HPC_SDK_NAME"]'
    KUBERNETES_MEMORY_REQUEST: 128Gi
    KUBERNETES_MEMORY_LIMIT: 128Gi

.build_baseimage_aarch64:
  extends: [.container-builder-cscs-gh200, .build_baseimage]
  variables:
    HPC_SDK_VERSION: 24.11
    HPC_SDK_NAME: "nvhpc_2024_2411_Linux_${ARCH}_cuda_12.6"

.build_image:
  stage: image
  variables:
      # Unique image name based on commit SHA
    PERSIST_IMAGE_NAME: $CSCS_REGISTRY_PATH/public/$ARCH/icon4py/icon4py-ci:$CI_COMMIT_SHA-$PYVERSION
    DOCKERFILE: ci/docker/checkout.Dockerfile
    DOCKER_BUILD_ARGS: '["PYVERSION=$PYVERSION", "BASE_IMAGE=$BASE_IMAGE"]'

.build_image_aarch64:
  extends: [.container-builder-cscs-gh200, .build_image]
  needs: [build_baseimage_aarch64]


.test_runner_base:
  timeout: 8h
  extends: .container-runner-santis-gh200
  variables:
    ICON4PY_DALLCLOSE_PRINT_INSTEAD_OF_FAIL: true
    CXXFLAGS: "-ffp-contract=off"
    SLURM_JOB_NUM_NODES: 1
    SLURM_GPUS_PER_NODE: 1
    SLURM_PARTITION: "shared"
    SLURM_CPU_BIND: "verbose"
    SLURM_TIMELIMIT: '00:30:00'
    SLURM_MPI_TYPE: pmix
    USE_MPI: NO
    PMIX_MCA_psec: native
    FI_PROVIDER: cxi
    OMPI_MCA_pml: cm
    OMPI_MCA_mtl: ofi
    CUDA_DEVICE_MAX_CONNECTIONS: 8
    CUDA_DEVICE_MAX_COPY_CONNECTIONS: 8
    ICON4PY_TEST_DATA_PATH: "/icon4py/testdata"
    ICON4PY_ENABLE_GRID_DOWNLOAD: true
    ICON4PY_ENABLE_TESTDATA_DOWNLOAD: true
    ICON4PY_CI_GT4PY_BUILD_CACHE_BASE_DIR: /gt4py_cache
    ICON4PY_DRIVER_LOGGING_LEVEL: critical
    PYTEST_ADDOPTS: "--durations=0"
    CSCS_ADDITIONAL_MOUNTS: '["/capstor/store/cscs/userlab/cwci02/icon4py/ci/testdata:$ICON4PY_TEST_DATA_PATH","/iopsstor/scratch/cscs/svc_cwci02_cicd_ext:$ICON4PY_CI_GT4PY_BUILD_CACHE_BASE_DIR"]'
    # Grace-Hopper gpu architecture is not enabled by default in CUDA build
    CUDAARCHS: "90"
    # Creating more pytest workers speeds up testing, but pytest startup time
    # also scales with number of workers; 32 is a balance between these for jobs
    # that don't run many tests.
    NUM_PROCESSES: 32
    GT4PY_BUILD_JOBS: 8
    GT4PY_BUILD_CACHE_LIFETIME: "persistent"
    RUNNER: "ci-runner"
    SYSTEM_TAG: "${FIRECREST_SYSTEM}-gh200"

.test_runner_serial:
  extends: .test_runner_base
  image: $CSCS_REGISTRY_PATH/public/$ARCH/icon4py/icon4py-ci:$CI_COMMIT_SHA-$PYVERSION
  before_script:
    - cd /icon4py
    - source ci/scripts/start-cuda-mps.sh
    - source ci/scripts/gt4py-cache.sh
  variables:
    SLURM_NTASKS: 1
    PY2F_GPU_TESTS: 1
    CUDACXX: "${HPC_SDK_PATH}/compilers/bin/nvcc"
    NVFORTRAN_COMPILER: "${HPC_SDK_PATH}/compilers/bin/nvfortran"
    HPC_SDK_PATH: "/opt/nvidia/hpc_sdk/Linux_${ARCH}/24.11"
    ICON4PY_NOX_UV_CUSTOM_SESSION_EXTRAS: "cuda12"

.test_runner_mpi:
  extends: .test_runner_base
  image: $CSCS_REGISTRY_PATH/public/$ARCH/icon4py/icon4py-ci:$CI_COMMIT_SHA-$PYVERSION
  before_script:
    - cd /icon4py
    - source .venv/bin/activate
    - source ci/scripts/start-cuda-mps.sh
    - source ci/scripts/gt4py-cache.sh
  variables:
    SLURM_NTASKS: 4

.test_model_aarch64:
  stage: test
  extends: .test_runner_serial
  script:
    - |
      NOX_ARGS="--backend=$BACKEND"
      if [ -n "${GRID:-}" ]; then NOX_ARGS="$NOX_ARGS --grid=$GRID"; fi
      if [ -n "${LEVEL:-}" ]; then NOX_ARGS="$NOX_ARGS --level=$LEVEL"; fi
      nox -s "test_model-3.13($MODEL_SUBSET, $MODEL_SUBPACKAGE)" -- $NOX_ARGS
  rules:
    - if: $LEVEL == 'extended'
      variables:
        SLURM_TIMELIMIT: "2:00:00"
        SLURM_PARTITION: "normal"
    - if: $BACKEND == 'dace_gpu' || $BACKEND == 'gtfn_gpu'
      variables:
        NUM_PROCESSES: 8
        SLURM_TIMELIMIT: '01:00:00'
    - if: $MODEL_SUBPACKAGE == 'standalone_driver'
      variables:
        SLURM_TIMELIMIT: '00:50:00'
    - if: $MODEL_SUBPACKAGE == 'driver' || $MODEL_SUBPACKAGE == 'dycore' || $MODEL_SUBPACKAGE == 'muphys'
      variables:
        SLURM_TIMELIMIT: '00:30:00'
    - when: on_success
      variables:
        SLURM_TIMELIMIT: '00:30:00'

.test_tools_aarch64:
  stage: test
  extends: .test_runner_serial
  script:
    - nox -s "test_tools_and_bindings-3.13($SELECTION)"

.test_mpi_aarch64:
  stage: test
  extends: .test_runner_mpi
  script:
    - ci/scripts/ci-mpi-wrapper.sh nox -s "test_model_mpi-3.13($SELECTION, $MODEL_MPI_SUBPACKAGE)" -- --backend=$BACKEND --level=$LEVEL
  rules:
    - if: $LEVEL == 'extended'
      variables:
        SLURM_TIMELIMIT: "4:00:00"
        SLURM_PARTITION: "normal"
    - if: $MODEL_MPI_SUBPACKAGE == 'advection'
      variables:
        SLURM_TIMELIMIT: '00:10:00'
    - if: $MODEL_MPI_SUBPACKAGE == 'diffusion'
      variables:
        SLURM_TIMELIMIT: '00:10:00'
    - if: $MODEL_MPI_SUBPACKAGE == 'dycore' && ($BACKEND == 'dace_cpu' || $BACKEND == 'dace_gpu')
      variables:
        SLURM_TIMELIMIT: '00:30:00'
    - if: ($MODEL_MPI_SUBPACKAGE == 'common' && ($BACKEND == 'dace_cpu' || $BACKEND == 'dace_gpu' || $BACKEND == 'gtfn_gpu')) || ($MODEL_MPI_SUBPACKAGE == 'standalone_driver' && $BACKEND == 'dace_gpu')
      variables:
        SLURM_TIMELIMIT: '01:30:00'
        SLURM_PARTITION: "normal"
    - if: $MODEL_MPI_SUBPACKAGE == 'dycore'
      variables:
        SLURM_TIMELIMIT: '00:15:00'
    - when: on_success
      variables:
        SLURM_TIMELIMIT: '00:50:00'
  artifacts:
    when: always
    paths:
      - pytest-log-rank-*.txt

.generate_test_child_pipeline:
  stage: generate_test
  extends: .container-runner-lightweight-gh200
  image: ghcr.io/astral-sh/uv:python3.12-trixie-slim
  timeout: 5m
  variables:
    GIT_STRATEGY: fetch
    KUBERNETES_MEMORY_REQUEST: 4Gi
    KUBERNETES_MEMORY_LIMIT: 4Gi
  script:
    - scripts/run generate-ci-pipeline > $CI_PROJECT_DIR/test.yml
    - cat $CI_PROJECT_DIR/test.yml
  artifacts:
    paths: [test.yml]

.trigger_test_child_pipeline:
  stage: trigger_test
  needs: [generate_test_child_pipeline, build_image_aarch64]
  trigger:
    include:
      - artifact: test.yml
        job: generate_test_child_pipeline
    strategy: depend
    forward:
      pipeline_variables: true
