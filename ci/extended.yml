include:
  - local: 'ci/base_distributed.yml'

test_extended_distributed:
  stage: test
  extends: [.test_distributed_aarch64]
  variables:
    SLURM_PARTITION: "normal"
    SLURM_TIMELIMIT: "4:00:00"
    ICON4PY_DALLCLOSE_PRINT_INSTEAD_OF_FAIL: true
    OPENBLAS_CORETYPE: GENERIC
    OPENBLAS_NUM_THREADS: 1
    CFLAGS: "-ffp-contract=off -fno-unsafe-math-optimizations"
    CXXFLAGS: "-ffp-contract=off -fno-unsafe-math-optimizations"
    CUBLAS_WORKSPACE_CONFIG: ":4096:8"
    CUDAFLAGS: "--fmad=false"
    CUDA_NVCC_FLAGS: "--fmad=false"
    CUPY_TF32: 0
    NVCC_PREPEND_FLAGS: "--fmad=false -Xcompiler=-ffp-contract=off"
  parallel:
    matrix:
      - COMPONENT: [standalone_driver]
        # BACKEND: [embedded, dace_cpu, dace_gpu, gtfn_cpu, gtfn_gpu]
        BACKEND: [dace_cpu, dace_gpu, gtfn_cpu, gtfn_gpu]
        LEVEL: [extended]
