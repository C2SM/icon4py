include:
  - local: 'ci/base.yml'

variables:
  # See default.yml and generate_ci_pipelines.py for details on how these are
  # used. This pipeline is triggered on merges through the merge queue and
  # should generally not be triggered manually.
  #
  # The matrix defined by the options below gates PR merges.
  MODEL_SUBPACKAGES: "advection:diffusion:dycore:microphysics:muphys:common:driver:standalone_driver"
  MPI_SUBPACKAGES: "atmosphere/advection:atmosphere/diffusion:atmosphere/dycore:common:standalone_driver"
  BACKENDS: "embedded:dace_cpu:dace_gpu:gtfn_cpu:gtfn_gpu"
  LEVELS: "integration"
  GRIDS: "simple:icon_regional"
  SESSION: "model:tools:mpi"
  MODEL_SUBSET: "stencils:datatest"


build_baseimage_aarch64:
  extends: [.build_baseimage_aarch64]

build_image_aarch64:
  extends: [.build_image_aarch64]

build_mpi_baseimage_aarch64:
  extends: [.build_mpi_baseimage_aarch64]

build_mpi_image_aarch64:
  extends: [.build_mpi_image_aarch64]

generate_test_child_pipeline:
  extends: [.generate_test_child_pipeline]

trigger_test_child_pipeline:
  extends: [.trigger_test_child_pipeline]
