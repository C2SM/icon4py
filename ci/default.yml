include:
  - local: 'ci/base.yml'

.test_model_stencils:
  stage: test
  script:
    - nox -s "test_model-3.13(stencils, $COMPONENT)" -- --backend=$BACKEND --grid=$GRID
  rules:
    - if: $BACKEND == 'dace_gpu' || $BACKEND == 'gtfn_gpu'
      variables:
        NUM_PROCESSES: 8
        SLURM_TIMELIMIT: '00:30:00'
        DACE_compiler_cuda_implementation: experimental
    - if: $COMPONENT == 'dycore'
      variables:
        SLURM_TIMELIMIT: '00:15:00'
        DACE_compiler_cuda_implementation: experimental
    - when: on_success
      variables:
        SLURM_TIMELIMIT: '00:05:00'
        DACE_compiler_cuda_implementation: experimental
  parallel:
    matrix:
      - COMPONENT: [diffusion, dycore, microphysics, muphys, common, driver]
        BACKEND: [dace_gpu, gtfn_gpu]
        GRID: [simple, icon_regional]
test_model_stencils_aarch64:
  extends: [.test_model_stencils, .test_template_aarch64]


.test_tools_datatests:
  stage: test
  script:
    - nox -s 'test_tools_and_bindings-3.13(datatest)'
test_tools_datatests_aarch64:
  extends: [.test_tools_datatests, .test_template_aarch64]

.test_model_datatests:
  stage: test
  script:
    - nox -s "test_model-3.13(datatest, $COMPONENT)" -- --backend=$BACKEND --level=$LEVEL
  rules:
    - if: $COMPONENT == 'standalone_driver'
      variables:
        SLURM_TIMELIMIT: '00:50:00'
        DACE_compiler_cuda_implementation: experimental
    - if: $BACKEND == 'dace_gpu' || $BACKEND == 'gtfn_gpu'
      variables:
        NUM_PROCESSES: 8
        SLURM_TIMELIMIT: '00:40:00'
        DACE_compiler_cuda_implementation: experimental
    - if: $COMPONENT == 'driver' || $COMPONENT == 'dycore' || $COMPONENT == 'muphys'
      variables:
        SLURM_TIMELIMIT: '00:30:00'
        DACE_compiler_cuda_implementation: experimental
    - when: on_success
      variables:
        SLURM_TIMELIMIT: '00:15:00'
        DACE_compiler_cuda_implementation: experimental
  parallel:
    matrix:
      - COMPONENT: [advection, diffusion, dycore, microphysics, muphys, common, driver, standalone_driver]
        BACKEND: [embedded, dace_cpu, dace_gpu, gtfn_cpu, gtfn_gpu]
        LEVEL: [integration]
test_model_datatests_aarch64:
  extends: [.test_model_datatests, .test_template_aarch64]
