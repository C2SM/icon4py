include:
  - local: 'ci/base.yml'

variables:
  # These variables filter jobs below. Not all variables apply to all jobs (e.g.
  # GRIDS only applies to stencil tests). These are the defaults for the
  # pipeline and don't include all possible jobs. The are meant to be overridden
  # with with e.g.
  #
  # cscs-ci run default;BACKENDS=gtfn_cpu;LEVELS=unit;COMPONENTS=common:standalone_driver
  COMPONENTS: "advection:diffusion:dycore:microphysics:muphys:common:driver:standalone_driver:atmosphere/diffusion:atmosphere/dycore"
  BACKENDS: "dace_gpu"
  LEVELS: "integration"
  GRIDS: "simple:icon_regional"
  SELECTION: "stencils:datatest:mpi:tools"


build_baseimage_aarch64:
  extends: [.container-builder-cscs-gh200, .build_baseimage]
  variables:
    HPC_SDK_VERSION: 24.11
    HPC_SDK_NAME: "nvhpc_2024_2411_Linux_${ARCH}_cuda_12.6"

build_image_aarch64:
  extends: [.container-builder-cscs-gh200, .build_image]
  needs: [build_baseimage_aarch64]


.build_mpi_baseimage:
  stage: baseimage
  before_script:
    - DOCKER_TAG=`echo "$(cat $DOCKERFILE) $DOCKER_BUILD_ARGS" | sha256sum | head -c 16`
    - export PERSIST_IMAGE_NAME=$CSCS_REGISTRY_PATH/public/$ARCH/base/icon4py:$DOCKER_TAG-$PYVERSION-mpi
    - echo "BASE_IMAGE_${PYVERSION_PREFIX}=$PERSIST_IMAGE_NAME" >> build.env
  artifacts:
    reports:
      dotenv: build.env
  variables:
    DOCKERFILE: ci/docker/base_mpi.Dockerfile
    CSCS_REBUILD_POLICY: if-not-exists

build_mpi_baseimage_aarch64:
  extends: [.container-builder-cscs-gh200, .build_mpi_baseimage]
  variables:
    DOCKER_BUILD_ARGS: '["ARCH=$ARCH", "PYVERSION=$PYVERSION"]'

.build_mpi_image:
  stage: image
  variables:
    DOCKERFILE: ci/docker/checkout_mpi.Dockerfile
    DOCKER_BUILD_ARGS: '["PYVERSION=$PYVERSION", "BASE_IMAGE=${BASE_IMAGE_${PYVERSION_PREFIX}}", "VENV=${UV_PROJECT_ENVIRONMENT}"]'
    PERSIST_IMAGE_NAME: $CSCS_REGISTRY_PATH/public/$ARCH/icon4py/icon4py-ci:$CI_COMMIT_SHA-$UV_PROJECT_ENVIRONMENT-$PYVERSION-mpi

build_mpi_image_aarch64:
  stage: image
  extends: [.container-builder-cscs-gh200, .build_mpi_image]
  needs: [build_mpi_baseimage_aarch64]
  variables:
    UV_PROJECT_ENVIRONMENT: venv_dist

# Generate child pipelines dynamically based on selection of COMPONENTS,
# BACKENDS, etc. using scripts/python/generate_ci_pipeline.py. Only test jobs
# that match the filters are generated.
generate_test_child_pipeline:
  stage: generate_test
  extends: .container-runner-santis-gh200
  image: $CSCS_REGISTRY_PATH/public/$ARCH/icon4py/icon4py-ci:$CI_COMMIT_SHA-$PYVERSION
  needs: [build_image_aarch64]
  variables:
    SLURM_NTASKS: 1
    SLURM_JOB_NUM_NODES: 1
    SLURM_GPUS_PER_NODE: 1
    SLURM_PARTITION: "shared"
  script:
    - cd /icon4py
    - scripts/run generate-ci-pipeline > test.yml
  artifacts:
    paths: [test.yml]

trigger_test_child_pipeline:
  stage: trigger_test
  trigger:
    include:
      - artifact: test.yml
        job: generate_test_child_pipeline
    strategy: depend
